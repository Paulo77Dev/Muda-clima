<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muda Clima — Chat</title>

  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>
  <div class="chat-container" role="application" aria-label="Chat Muda Clima">
    <header class="chat-header">
      <h2>🤖 Chatbot Muda Clima</h2>
     <!-- <button id="closeChat" aria-label="Fechar chat">✕</button> -->
    </header>

    <div id="chatBox" class="chat-box" aria-live="polite">
      <div class="bot-message">
        <p>Olá! 👋 Sou o assistente do Muda Clima. Em que posso ajudar hoje?</p>
      </div>
    </div>

    <form id="chatForm" class="chat-input" autocomplete="off">
      <input type="text" id="userMessage" placeholder="Digite sua mensagem..." required autocomplete="off" />
      <button type="submit" id="sendBtn">Enviar</button>
    </form>
  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
